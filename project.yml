name: FastTranslate
options:
  bundleIdPrefix: com.fasttranslate
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  FastTranslate:
    type: application
    platform: macOS
    sources:
      - FastTranslate
    dependencies:
      - sdk: Carbon.framework
    settings:
      base:
        MARKETING_VERSION: "1.4.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: true
        INFOPLIST_FILE: FastTranslate/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FastTranslate/Resources/FastTranslate.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.fasttranslate.app
        PRODUCT_NAME: FastTranslate
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
