name: HotLingo
options:
  bundleIdPrefix: com.hotlingo
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en

localizations:
  - en
  - vi

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

schemes:
  HotLingo:
    build:
      targets:
        HotLingo: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

targets:
  HotLingo:
    type: application
    platform: macOS
    sources:
      - HotLingo
    dependencies:
      - sdk: Carbon.framework
    settings:
      base:
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: true
        INFOPLIST_FILE: HotLingo/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HotLingo/Resources/HotLingo.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.hotlingo.app
        PRODUCT_NAME: HotLingo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
